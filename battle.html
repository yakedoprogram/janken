    .fade-in {
      animation: fadeIn 1.5s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* デモ用のスタイル */
    .box {
      width: 300px;
      padding: 40px;
      margin: 50px auto;
      color: rgb(97, 25, 69);
      border-radius: 10px;
      text-align: center;
      font-size: 20px;
    }
  </style>
</head>
